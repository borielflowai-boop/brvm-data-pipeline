name: BRVM Daily Data Fetch

on:
  schedule:
    # 17:30 UTC = 18:30 WAT (market closes ~15:30, bulletin published ~16:30)
    - cron: '30 17 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Specific date to process (YYYY-MM-DD), leave empty for today'
        required: false
      backfill:
        description: 'Number of past trading days to backfill'
        required: false

jobs:
  fetch-bulletin:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser (scheduled / specific date)
        if: ${{ !inputs.backfill }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          run_with_retries() {
            local max_attempts=3
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Parser attempt ${attempt}/${max_attempts}"
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Parser failed after ${max_attempts} attempts."
                return 1
              fi
              local delay=$((attempt * 20))
              echo "Retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
            done
          }

          if [ -n "${{ inputs.date }}" ]; then
            run_with_retries python brvm_parser.py --date "${{ inputs.date }}"
          else
            run_with_retries python brvm_parser.py
          fi

      - name: Run parser (backfill)
        if: ${{ inputs.backfill }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          run_with_retries() {
            local max_attempts=3
            local attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Parser attempt ${attempt}/${max_attempts}"
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Parser failed after ${max_attempts} attempts."
                return 1
              fi
              local delay=$((attempt * 20))
              echo "Retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
            done
          }

          run_with_retries python brvm_parser.py --backfill "${{ inputs.backfill }}"
